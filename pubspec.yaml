name: mediapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

platforms:
  android:
  ios:
  web:
  macos:
  windows:

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # FIREBASE
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.0
  firebase_analytics: ^11.1.0
  firebase_messaging: ^15.0.2
  firebase_crashlytics: ^4.0.2

  # SOCIAL LOGIN
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.0

  # UTILS
  shared_preferences: ^2.2.3
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  video_player: ^2.9.2
  table_calendar: ^3.1.1
  flutter_rating_bar: ^4.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  particles_flutter: ^0.1.4
  carousel_slider: ^5.1.1
  animations: ^2.0.11
  flutter_tilt: ^2.0.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo2.png"
  image_path_ios: "assets/images/logo_ios.png"
  adaptive_icon_background: "#3ba4f3"
  adaptive_icon_foreground: "assets/images/logo2.png"

flutter_native_splash:
  color: "#3ba4f3"
  image: assets/images/logo2.png
  android_12:
    image: assets/images/logo2.png
    icon_background_color: "#3ba4f3"
  fullscreen: true
