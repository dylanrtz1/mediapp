<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        50% { opacity: .5; }
      }
      .fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .kpi-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .kpi-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .skeleton {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        background-color: #e5e7eb;
        border-radius: 0.5rem;
      }
    </style>
</head>
<body class="bg-gray-50">

<div id="dashboard-content" class="p-4 sm:p-8 opacity-0 transition-opacity duration-500">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10">
    <div>
      <h1 class="text-4xl font-bold text-gray-800">Dashboard</h1>
      <p class="text-gray-500 mt-1">Resumen en tiempo real del estado de la plataforma.</p>
    </div>
    <div class="mt-4 sm:mt-0">
      <img src="img/logo.png" alt="Logo Cirugías de Lujo" class="h-16 w-auto">
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div class="kpi-card bg-white p-6 rounded-2xl shadow-lg border-l-4 border-green-500">
      <div class="flex items-center space-x-4">
        <div class="bg-green-100 p-4 rounded-full"><i class="fas fa-sack-dollar text-green-600 text-2xl"></i></div>
        <div>
          <p class="text-gray-500 text-sm font-medium">Ingresos Aprobados (Mes)</p>
          <div id="ingresos-mes" class="text-3xl font-bold text-gray-800"><div class="skeleton h-8 w-32 mt-1"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-card bg-white p-6 rounded-2xl shadow-lg border-l-4 border-blue-500">
      <div class="flex items-center space-x-4">
        <div class="bg-blue-100 p-4 rounded-full"><i class="fas fa-calendar-day text-blue-600 text-2xl"></i></div>
        <div>
          <p class="text-gray-500 text-sm font-medium">Citas para Hoy</p>
          <div id="citas-hoy" class="text-3xl font-bold text-gray-800"><div class="skeleton h-8 w-16 mt-1"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-card bg-white p-6 rounded-2xl shadow-lg border-l-4 border-yellow-500">
      <div class="flex items-center space-x-4">
        <div class="bg-yellow-100 p-4 rounded-full"><i class="fas fa-users text-yellow-600 text-2xl"></i></div>
        <div>
          <p class="text-gray-500 text-sm font-medium">Nuevos Pacientes (Mes)</p>
          <div id="nuevos-pacientes" class="text-3xl font-bold text-gray-800"><div class="skeleton h-8 w-16 mt-1"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mt-8">
    <div class="lg:col-span-3 bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-gray-700 mb-4">Servicios Más Populares</h2>
      <div class="h-80 relative"><canvas id="servicios-populares-chart"></canvas></div>
    </div>
    <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-gray-700 mb-4">Citas por Estado</h2>
      <div class="h-80 relative"><canvas id="citas-por-estado-chart"></canvas></div>
    </div>
  </div>

  <div class="mt-8 bg-white p-6 rounded-2xl shadow-lg">
    <h2 class="text-xl font-bold text-gray-700 mb-4">Próximas Citas</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="border-b-2 border-gray-100">
          <tr>
            <th class="p-4 text-sm font-semibold text-gray-500">Paciente</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Doctor</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Fecha y Hora</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Estado</th>
          </tr>
        </thead>
        <tbody id="proximas-citas-lista">
          <tr>
            <td class="p-4"><div class="skeleton h-5 w-32"></div></td>
            <td class="p-4"><div class="skeleton h-5 w-32"></div></td>
            <td class="p-4"><div class="skeleton h-5 w-40"></div></td>
            <td class="p-4"><div class="skeleton h-5 w-24"></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
 
  import { collection, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


  const db = window.db; 
  let citasEstadoChart = null;
  let serviciosChart = null;
  
  const formatCurrency = (value) => value.toLocaleString('es-EC', { style: 'currency', currency: 'USD' });

  const loadDashboardData = async () => {
    try {
        const [pagosSnapshot, usersSnapshot] = await Promise.all([
            getDocs(collection(db, 'pagos')),
            getDocs(collection(db, 'users')),
        ]);

        const pagos = pagosSnapshot.docs.map(doc => doc.data());
        const users = usersSnapshot.docs.map(doc => doc.data());

        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

        const ingresosMes = pagos.filter(p => p.status === 'aprobado' && p.createdAt.toDate() >= startOfMonth).reduce((sum, p) => sum + (p.totalAmount || 0), 0);
        document.getElementById('ingresos-mes').textContent = formatCurrency(ingresosMes);

        const citasHoy = pagos.filter(p => p.appointmentDate.toDate() >= startOfToday && p.appointmentDate.toDate() < endOfToday).length;
        document.getElementById('citas-hoy').textContent = citasHoy;

        const nuevosPacientes = users.filter(u => u.createdAt && u.createdAt.toDate() >= startOfMonth && u.role === 'paciente').length;
        document.getElementById('nuevos-pacientes').textContent = nuevosPacientes;

        const statusCounts = pagos.reduce((acc, p) => {
            acc[p.status || 'desconocido'] = (acc[p.status || 'desconocido'] || 0) + 1;
            return acc;
        }, {});
        
        const ctxStatus = document.getElementById('citas-por-estado-chart').getContext('2d');
        if(citasEstadoChart) citasEstadoChart.destroy();
        citasEstadoChart = new Chart(ctxStatus, {
            type: 'doughnut',
            data: {
                labels: ['Aprobadas', 'Pendientes', 'Rechazadas'],
                datasets: [{
                    data: [statusCounts.aprobado || 0, statusCounts.pendiente || 0, statusCounts.rechazado || 0],
                    backgroundColor: ['#22c55e', '#f97316', '#ef4444'],
                    borderColor: '#ffffff',
                    borderWidth: 4,
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        const serviceCounts = pagos.reduce((acc, p) => {
            if (p.services && Array.isArray(p.services)) {
                p.services.forEach(service => {
                    const serviceName = service.id ? service.id.split('_').slice(2).join(' ') : 'Desconocido';
                    acc[serviceName] = (acc[serviceName] || 0) + (service.quantity || 1);
                });
            }
            return acc;
        }, {});
        
        const sortedServices = Object.entries(serviceCounts).sort(([,a],[,b]) => b-a).slice(0, 7);
            
        const ctxServicios = document.getElementById('servicios-populares-chart').getContext('2d');
        if(serviciosChart) serviciosChart.destroy();
        serviciosChart = new Chart(ctxServicios, {
            type: 'bar',
            data: {
                labels: sortedServices.map(item => item[0]),
                datasets: [{
                    label: 'Nº de Veces Solicitado',
                    data: sortedServices.map(item => item[1]),
                    backgroundColor: 'rgba(59, 130, 246, 0.6)',
                    borderColor: 'rgba(59, 130, 246, 1)',
                    borderWidth: 2,
                    borderRadius: 8,
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
        });

        const proximasCitas = pagos.filter(p => p.appointmentDate.toDate() >= startOfToday).sort((a, b) => a.appointmentDate.toDate() - b.appointmentDate.toDate()).slice(0, 5);
            
        const citasContainer = document.getElementById('proximas-citas-lista');
        citasContainer.innerHTML = '';
        
        if (proximasCitas.length === 0) {
            citasContainer.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-gray-500">No hay citas próximas agendadas.</td></tr>`;
        } else {
            proximasCitas.forEach(cita => {
                const date = cita.appointmentDate.toDate();
                const formattedDate = `${date.toLocaleDateString('es-EC')} - ${date.toLocaleTimeString('es-EC', {hour: '2-digit', minute:'2-digit'})}`;
                const statusInfo = {'aprobado': {text: 'Aprobado', color: 'text-green-600 bg-green-100'}, 'pendiente': {text: 'Pendiente', color: 'text-orange-600 bg-orange-100'}, 'rechazado': {text: 'Rechazado', color: 'text-red-600 bg-red-100'}}[cita.status] || {text: 'N/A', color: 'text-gray-600 bg-gray-100'};
                
                const row = `<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="p-4 font-medium text-gray-800">${cita.patientName || 'N/A'}</td><td class="p-4 text-gray-600">${cita.doctorName || 'N/A'}</td><td class="p-4 text-gray-600">${formattedDate}</td><td class="p-4"><span class="px-3 py-1 text-xs font-semibold rounded-full ${statusInfo.color}">${statusInfo.text}</span></td></tr>`;
                citasContainer.innerHTML += row;
            });
        }
    } catch (error) {
        console.error("Error al cargar los datos del dashboard:", error);
        document.getElementById('dashboard-content').innerHTML = `<div class="text-center p-10 bg-red-100 text-red-700 rounded-lg"><h2 class="text-2xl font-bold mb-2">Error de Conexión</h2><p>No se pudieron cargar los datos. Revisa la consola para más detalles.</p></div>`;
    } finally {
        document.getElementById('dashboard-content').classList.add('fade-in');
        document.getElementById('dashboard-content').style.opacity = '1';
    }
  };

 
  if (window.db) {
      loadDashboardData();
  } else {
      console.error("La base de datos de Firebase (window.db) no está disponible.");
  }

</script>

</body>
</html>
