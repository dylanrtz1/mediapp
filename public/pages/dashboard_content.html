<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        50% { opacity: .5; }
      }
      .fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .kpi-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .kpi-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
      }
      .skeleton {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        background-color: rgba(255,255,255,0.2);
        border-radius: 0.5rem;
      }
    </style>
</head>
<body class="bg-gray-50">

<div id="dashboard-content" class="p-4 sm:p-8 opacity-0 transition-opacity duration-500 text-white">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10">
    <div>
      <h1 class="text-4xl font-extrabold text-white">Dashboard</h1>
      <p class="text-white font-bold mt-1">Resumen en tiempo real del estado de la plataforma.</p>
    </div>
    <div class="mt-4 sm:mt-0">
      <img src="img/logo.png" alt="Logo Cirugías de Lujo" class="h-16 w-auto brightness-200">
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div class="kpi-card bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20">
      <div class="flex items-center space-x-4">
        <div class="bg-white/20 p-4 rounded-full"><i class="fas fa-sack-dollar text-green-300 text-2xl"></i></div>
        <div>
          <p class="text-white font-bold text-sm">Ingresos Aprobados (Mes)</p>
          <div id="ingresos-mes" class="text-3xl font-extrabold text-white"><div class="skeleton h-8 w-32 mt-1"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-card bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20">
      <div class="flex items-center space-x-4">
        <div class="bg-white/20 p-4 rounded-full"><i class="fas fa-calendar-day text-blue-300 text-2xl"></i></div>
        <div>
          <p class="text-white font-bold text-sm">Citas para Hoy</p>
          <div id="citas-hoy" class="text-3xl font-extrabold text-white"><div class="skeleton h-8 w-16 mt-1"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-card bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20">
      <div class="flex items-center space-x-4">
        <div class="bg-white/20 p-4 rounded-full"><i class="fas fa-users text-yellow-300 text-2xl"></i></div>
        <div>
          <p class="text-white font-bold text-sm">Nuevos Pacientes (Mes)</p>
          <div id="nuevos-pacientes" class="text-3xl font-extrabold text-white"><div class="skeleton h-8 w-16 mt-1"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mt-8">
    <div class="lg:col-span-3 bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20">
      <h2 class="text-xl font-extrabold text-white mb-4">Servicios Más Populares</h2>
      <div class="h-80 relative"><canvas id="servicios-populares-chart"></canvas></div>
    </div>
    <div class="lg:col-span-2 bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20">
      <h2 class="text-xl font-extrabold text-white mb-4">Citas por Estado</h2>
      <div class="h-80 relative"><canvas id="citas-por-estado-chart"></canvas></div>
    </div>
  </div>

  <div class="mt-8 bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg border border-white/20">
    <h2 class="text-xl font-extrabold text-white mb-4">Próximas Citas</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="border-b border-white/30">
          <tr>
            <th class="p-4 text-sm font-extrabold text-white">Paciente</th>
            <th class="p-4 text-sm font-extrabold text-white">Doctor</th>
            <th class="p-4 text-sm font-extrabold text-white">Fecha y Hora</th>
            <th class="p-4 text-sm font-extrabold text-white">Estado</th>
          </tr>
        </thead>
        <tbody id="proximas-citas-lista">
          <tr>
            <td class="p-4"><div class="skeleton h-5 w-32"></div></td>
            <td class="p-4"><div class="skeleton h-5 w-32"></div></td>
            <td class="p-4"><div class="skeleton h-5 w-40"></div></td>
            <td class="p-4"><div class="skeleton h-5 w-24"></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { collection, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db = window.db;
  let citasEstadoChart = null;
  let serviciosChart = null;

  const formatCurrency = (value) => value.toLocaleString('es-EC', { style: 'currency', currency: 'USD' });

  const loadDashboardData = async () => {
    try {
        const [pagosSnapshot, usersSnapshot] = await Promise.all([
            getDocs(collection(db, 'pagos')),
            getDocs(collection(db, 'users')),
        ]);

        const pagos = pagosSnapshot.docs.map(doc => doc.data());
        const users = usersSnapshot.docs.map(doc => doc.data());

        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

        const ingresosMes = pagos.filter(p => p.status === 'aprobado' && p.createdAt.toDate() >= startOfMonth).reduce((sum, p) => sum + (p.totalAmount || 0), 0);
        document.getElementById('ingresos-mes').textContent = formatCurrency(ingresosMes);

        const citasHoy = pagos.filter(p => p.appointmentDate.toDate() >= startOfToday && p.appointmentDate.toDate() < endOfToday).length;
        document.getElementById('citas-hoy').textContent = citasHoy;

        const nuevosPacientes = users.filter(u => u.createdAt && u.createdAt.toDate() >= startOfMonth && u.role === 'paciente').length;
        document.getElementById('nuevos-pacientes').textContent = nuevosPacientes;

        const statusCounts = pagos.reduce((acc, p) => {
            acc[p.status || 'desconocido'] = (acc[p.status || 'desconocido'] || 0) + 1;
            return acc;
        }, {});

        const ctxStatus = document.getElementById('citas-por-estado-chart').getContext('2d');
        if(citasEstadoChart) citasEstadoChart.destroy();
        citasEstadoChart = new Chart(ctxStatus, {
            type: 'doughnut',
            data: {
                labels: ['Aprobadas', 'Pendientes', 'Rechazadas'],
                datasets: [{
                    data: [statusCounts.aprobado || 0, statusCounts.pendiente || 0, statusCounts.rechazado || 0],
                    backgroundColor: ['#00e676', '#ff9100', '#ff1744'],
                    borderColor: 'rgba(255,255,255,0.15)',
                    borderWidth: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#ffffff',
                            font: { weight: 'bold', size: 13 },
                            padding: 16
                        }
                    }
                }
            }
        });

        const serviceCounts = pagos.reduce((acc, p) => {
            if (p.services && Array.isArray(p.services)) {
                p.services.forEach(service => {
                    const serviceName = service.id ? service.id.split('_').slice(2).join(' ') : 'Desconocido';
                    acc[serviceName] = (acc[serviceName] || 0) + (service.quantity || 1);
                });
            }
            return acc;
        }, {});

        const sortedServices = Object.entries(serviceCounts).sort(([,a],[,b]) => b-a).slice(0, 7);

        const ctxServicios = document.getElementById('servicios-populares-chart').getContext('2d');
        if(serviciosChart) serviciosChart.destroy();
        serviciosChart = new Chart(ctxServicios, {
            type: 'bar',
            data: {
                labels: sortedServices.map(item => item[0]),
                datasets: [{
                    label: 'Nº de Veces Solicitado',
                    data: sortedServices.map(item => item[1]),
                    backgroundColor: '#38bdf8',
                    borderColor: '#ffffff',
                    borderWidth: 2,
                    borderRadius: 8,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        ticks: { color: '#ffffff', font: { weight: 'bold' } },
                        grid: { color: 'rgba(255,255,255,0.15)' }
                    },
                    y: {
                        ticks: { color: '#ffffff', font: { weight: 'bold' } },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                }
            }
        });

        const proximasCitas = pagos.filter(p => p.appointmentDate.toDate() >= startOfToday).sort((a, b) => a.appointmentDate.toDate() - b.appointmentDate.toDate()).slice(0, 5);

        const citasContainer = document.getElementById('proximas-citas-lista');
        citasContainer.innerHTML = '';

        if (proximasCitas.length === 0) {
            citasContainer.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-white font-bold">No hay citas próximas agendadas.</td></tr>`;
        } else {
            proximasCitas.forEach(cita => {
                const date = cita.appointmentDate.toDate();
                const formattedDate = `${date.toLocaleDateString('es-EC')} - ${date.toLocaleTimeString('es-EC', {hour: '2-digit', minute:'2-digit'})}`;
                const statusInfo = {
                    'aprobado':  { text: 'Aprobado',  color: 'text-green-300 bg-green-500/30 border border-green-400/40' },
                    'pendiente': { text: 'Pendiente', color: 'text-orange-300 bg-orange-500/30 border border-orange-400/40' },
                    'rechazado': { text: 'Rechazado', color: 'text-red-300 bg-red-500/30 border border-red-400/40' }
                }[cita.status] || { text: 'N/A', color: 'text-white bg-white/10 border border-white/20' };

                const row = `<tr class="border-b border-white/10 hover:bg-white/10 transition-colors">
                    <td class="p-4 font-bold text-white">${cita.patientName || 'N/A'}</td>
                    <td class="p-4 font-bold text-white">${cita.doctorName || 'N/A'}</td>
                    <td class="p-4 font-bold text-white">${formattedDate}</td>
                    <td class="p-4"><span class="px-3 py-1 text-xs font-extrabold rounded-full ${statusInfo.color}">${statusInfo.text}</span></td>
                </tr>`;
                citasContainer.innerHTML += row;
            });
        }
    } catch (error) {
        console.error("Error al cargar los datos del dashboard:", error);
        document.getElementById('dashboard-content').innerHTML = `<div class="text-center p-10 bg-red-500/20 border border-red-400/40 text-white rounded-2xl"><h2 class="text-2xl font-extrabold mb-2">Error de Conexión</h2><p class="font-bold">No se pudieron cargar los datos. Revisa la consola para más detalles.</p></div>`;
    } finally {
        document.getElementById('dashboard-content').classList.add('fade-in');
        document.getElementById('dashboard-content').style.opacity = '1';
    }
  };

  if (window.db) {
      loadDashboardData();
  } else {
      console.error("La base de datos de Firebase (window.db) no está disponible.");
  }
</script>

</body>
</html>
