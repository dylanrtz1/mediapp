<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pacientes</title>
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 50% { opacity: .5; } }
      .fade-in { animation: fadeIn 0.6s ease-out forwards; }
      .kpi-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
      .kpi-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
      .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; background-color: #e5e7eb; border-radius: 0.5rem; }
      .pagination-btn:disabled { cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body class="bg-gray-50">

<div id="patients-content" class="fade-in">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10">
    <div>
      <h1 class="text-4xl font-bold text-gray-800">Gestión de Pacientes</h1>
      <p class="text-gray-500 mt-1">Visualiza, busca y analiza la información de tus pacientes.</p>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="kpi-card bg-white p-6 rounded-2xl shadow-lg border-l-4 border-blue-500">
      <div class="flex items-center space-x-4">
        <div class="bg-blue-100 p-4 rounded-full"><i class="fas fa-users text-blue-600 text-2xl"></i></div>
        <div>
          <p class="text-gray-500 text-sm font-medium">Total de Pacientes</p>
          <div id="total-pacientes" class="text-3xl font-bold text-gray-800"><div class="skeleton h-8 w-16 mt-1"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-card bg-white p-6 rounded-2xl shadow-lg border-l-4 border-green-500">
      <div class="flex items-center space-x-4">
        <div class="bg-green-100 p-4 rounded-full"><i class="fas fa-user-plus text-green-600 text-2xl"></i></div>
        <div>
          <p class="text-gray-500 text-sm font-medium">Nuevos Pacientes (Este Mes)</p>
          <div id="nuevos-este-mes" class="text-3xl font-bold text-gray-800"><div class="skeleton h-8 w-16 mt-1"></div></div>
        </div>
      </div>
    </div>
    <div class="kpi-card bg-white p-6 rounded-2xl shadow-lg border-l-4 border-purple-500">
      <div class="flex items-center space-x-4">
        <div class="bg-purple-100 p-4 rounded-full"><i class="fas fa-chart-line text-purple-600 text-2xl"></i></div>
        <div>
          <p class="text-gray-500 text-sm font-medium">Crecimiento vs Mes Pasado</p>
          <div id="crecimiento-mensual" class="text-3xl font-bold text-gray-800"><div class="skeleton h-8 w-24 mt-1"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-8 bg-white p-6 rounded-2xl shadow-lg">
    <div class="flex flex-col sm:flex-row justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-700">Lista de Pacientes</h2>
      <div class="relative mt-4 sm:mt-0 w-full sm:w-72">
        <input type="text" id="search-pacientes" placeholder="Buscar en todos los pacientes..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead class="border-b-2 border-gray-100">
          <tr>
            <th class="p-4 text-sm font-semibold text-gray-500">Nombre Completo</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Email</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Teléfono</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Ciudad</th>
            <th class="p-4 text-sm font-semibold text-gray-500">Fecha de Registro</th>
          </tr>
        </thead>
        <tbody id="pacientes-lista">
          <tr><td colspan="5" class="p-4"><div class="skeleton h-5 w-full"></div></td></tr>
          <tr><td colspan="5" class="p-4"><div class="skeleton h-5 w-full"></div></td></tr>
          <tr><td colspan="5" class="p-4"><div class="skeleton h-5 w-full"></div></td></tr>
        </tbody>
      </table>
    </div>
    <div id="pagination-controls" class="flex justify-between items-center mt-4 pt-4 border-t">
      <span id="page-info" class="text-sm text-gray-600">Página 1 de 1</span>
      <div class="flex space-x-2">
        <button id="prev-page" class="pagination-btn px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">Anterior</button>
        <button id="next-page" class="pagination-btn px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">Siguiente</button>
      </div>
    </div>
  </div>
  
  <div class="mt-8 bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-gray-700 mb-4">Crecimiento de Pacientes (Últimos 6 Meses)</h2>
      <div class="h-80 relative">
        <canvas id="crecimiento-pacientes-chart"></canvas>
      </div>
  </div>
</div>

<script type="module">
  import { collection, getDocs, query, where, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db = window.db;
  let allPatients = [];
  let lastVisible = null;
  let firstVisible = null;
  let currentPage = 1;
  const PAGE_SIZE = 15;
  let totalPages = 1;
  let isSearching = false;

  const loadInitialData = async () => {
    try {
      const q = query(collection(db, "users"), where("role", "==", "paciente"));
      const usersSnapshot = await getDocs(q);
      allPatients = usersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      allPatients.sort((a, b) => b.createdAt.toMillis() - a.createdAt.toMillis());
      
      totalPages = Math.ceil(allPatients.length / PAGE_SIZE);

      renderKPIs(allPatients);
      renderGrowthChart(allPatients);
      renderTablePage(1);
    } catch (error) {
      console.error("Error al cargar datos iniciales:", error);
      document.getElementById('patients-content').innerHTML = `<div class="text-center p-10 bg-red-100 text-red-700 rounded-lg"><h2 class="text-2xl font-bold mb-2">Error</h2><p>No se pudieron cargar los datos.</p></div>`;
    }
  };

  const renderKPIs = (patients) => {
    const now = new Date();
    const startOfCurrentMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    const startOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const endOfLastMonth = new Date(now.getFullYear(), now.getMonth(), 0);

    document.getElementById('total-pacientes').textContent = patients.length;
    
    const nuevosEsteMes = patients.filter(u => u.createdAt && u.createdAt.toDate() >= startOfCurrentMonth).length;
    document.getElementById('nuevos-este-mes').textContent = nuevosEsteMes;
    
    const nuevosMesPasado = patients.filter(u => u.createdAt && u.createdAt.toDate() >= startOfLastMonth && u.createdAt.toDate() <= endOfLastMonth).length;
    let crecimiento = nuevosMesPasado > 0 ? ((nuevosEsteMes - nuevosMesPasado) / nuevosMesPasado) * 100 : (nuevosEsteMes > 0 ? 100 : 0);
    
    const crecimientoEl = document.getElementById('crecimiento-mensual');
    crecimientoEl.textContent = `${crecimiento.toFixed(0)}%`;
    crecimientoEl.classList.toggle('text-green-500', crecimiento >= 0);
    crecimientoEl.classList.toggle('text-red-500', crecimiento < 0);
  };

  const renderTablePage = (page) => {
    const start = (page - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const patientsToShow = allPatients.slice(start, end);
    renderTable(patientsToShow);
    currentPage = page;
    updatePaginationControls();
  };
  
  const renderTable = (patients) => {
    const tableBody = document.getElementById('pacientes-lista');
    tableBody.innerHTML = '';

    if (patients.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="5" class="text-center p-8 text-gray-500">No se encontraron pacientes.</td></tr>`;
        return;
    }
    
    patients.forEach(patient => {
        const fullName = `${patient.nombre || ''} ${patient.apellido || ''}`.trim();
        const createdAt = patient.createdAt ? patient.createdAt.toDate().toLocaleDateString('es-EC') : 'N/A';
        const row = `<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="p-4 font-medium text-gray-800">${fullName}</td><td class="p-4 text-gray-600">${patient.email || 'N/A'}</td><td class="p-4 text-gray-600">${patient.telefono || 'N/A'}</td><td class="p-4 text-gray-600">${patient.city || 'N/A'}</td><td class="p-4 text-gray-600">${createdAt}</td></tr>`;
        tableBody.innerHTML += row;
    });
  };

  const updatePaginationControls = () => {
    document.getElementById('page-info').textContent = `Página ${currentPage} de ${totalPages}`;
    document.getElementById('prev-page').disabled = currentPage <= 1;
    document.getElementById('next-page').disabled = currentPage >= totalPages;
  };

  let crecimientoChart = null;
  const renderGrowthChart = (patients) => {
    const monthlyData = Array(6).fill(0);
    const labels = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        labels.push(d.toLocaleString('es-EC', { month: 'long' }));
    }
    patients.forEach(p => {
        if (p.createdAt) {
            const regDate = p.createdAt.toDate();
            const monthDiff = (now.getFullYear() - regDate.getFullYear()) * 12 + (now.getMonth() - regDate.getMonth());
            if (monthDiff >= 0 && monthDiff < 6) {
                monthlyData[5 - monthDiff]++;
            }
        }
    });
    const ctx = document.getElementById('crecimiento-pacientes-chart').getContext('2d');
    if (crecimientoChart) crecimientoChart.destroy();
    crecimientoChart = new Chart(ctx, {
        type: 'line', data: { labels: labels, datasets: [{ label: 'Nuevos Pacientes', data: monthlyData, borderColor: 'rgba(59, 130, 246, 1)', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
  };

  document.getElementById('search-pacientes').addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase().trim();
    if (searchTerm === '') {
        isSearching = false;
        renderTablePage(1);
        document.getElementById('pagination-controls').style.display = 'flex';
    } else {
        isSearching = true;
        const filteredPatients = allPatients.filter(p => {
            const fullName = `${p.nombre || ''} ${p.apellido || ''}`.toLowerCase();
            const email = (p.email || '').toLowerCase();
            return fullName.includes(searchTerm) || email.includes(searchTerm);
        });
        renderTable(filteredPatients);
        document.getElementById('pagination-controls').style.display = 'none';
    }
  });

  document.getElementById('prev-page').addEventListener('click', () => {
    if (currentPage > 1) {
        renderTablePage(currentPage - 1);
    }
  });

  document.getElementById('next-page').addEventListener('click', () => {
    if (currentPage < totalPages) {
        renderTablePage(currentPage + 1);
    }
  });

  if (window.db) {
      loadInitialData();
  } else {
      console.error("La base de datos de Firebase (window.db) no está disponible.");
  }
</script>

</body>
</html>
